<!-- Tags we have learned in this lecture (Form, label, input, select, option) -->

<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
</head>

<body>
    <h1>Forms</h1>
    <form action="">
        <label for="username">Name</label>
        <input type="text" id="username" placeholder="Enter your name"> <br> <br>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email"> <br> <br>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password"> <br> <br>

        <p>select your gender</p>
        <label for="male">Male</label><input type="radio" name="gender" id="male">
        <label for="f male">Female</label><input type="radio" name="gender" id="female">
        <label for="others">Others</label><input type="radio" name="gender" id="others">
        <br> <br>

        <select name="" id="">
            <option value="Choose any one">Choose any one</option>
            <option value="civic">Civic</option>
            <option value="bmw">BMW</option>
            <option value="honda">Honda</option>
            <option value="audi">Audi</option>
        </select> <br> <br>

        <label for="">Your DOB</label>
        <input type="date" name="" id=""> <br> <br>
        <input type="submit" value="SignUp">
    </form>
</body>

</html>
