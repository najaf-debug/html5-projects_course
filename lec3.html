<!-- Tags we have learned in this lecture (image tag, video, tables (table row tr, th Table heading, Table data td)) -->


<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <!-- image tag -->
     <img width="300" height="400" src="/images/pic1.jpg" alt="">
     <img width="300" height="400" src="/images/pic2.jpg" alt="">
     
     <!-- video tag -->
    <video width="300" height="400" controls>
        <source src="/videos/video1.mp4">
        </video>

    <!-- tables -->
     <table border="2">
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>Najaf</td>
            <td>Computer</td>            
            <td>75</td>            
            <td>24</td>            

        </tr>
        <tr>
            <td>Ali</td>
            <td>English</td>            
            <td>80</td>            
            <td>24</td>            

        </tr>
        <tr>
            <td>Haider</td>
            <td>Science</td>            
            <td>65</td>            
            <td>24</td>            

        </tr>
        
     </table>
</body>
</html>
